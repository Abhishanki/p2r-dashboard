
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .slide { border-radius: var(--border-radius-lg); border: 1px solid var(--color-border-tertiary); background: var(--color-background-primary); padding: 36px 44px 28px; display: flex; flex-direction: column; }
  .slide-tag { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .slide h2 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .accent-bar { width: 36px; height: 3px; background: #534AB7; border-radius: 2px; margin: 10px 0 18px; }
  .summary-strip { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 18px; }
  .sc { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .sc .lbl { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .sc .val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .sc .sub { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
  .metrics { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 7px; margin-bottom: 18px; }
  .mc { border-radius: var(--border-radius-md); padding: 12px 12px 10px; border: 1px solid transparent; cursor: pointer; transition: opacity .15s; }
  .mc:hover { opacity: 0.85; }
  .mc .bucket-label { font-size: 10px; font-weight: 500; margin-bottom: 2px; }
  .mc .count { font-size: 22px; font-weight: 500; margin-bottom: 1px; }
  .mc .range { font-size: 10px; margin-bottom: 8px; }
  .mc .divider { height: 1px; margin: 0 0 8px; opacity: 0.25; }
  .mc .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
  .mc .row-label { font-size: 9px; opacity: 0.7; }
  .mc .row-val { font-size: 11px; font-weight: 500; }
  .mc .pct-bar-track { height: 4px; border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .mc .pct-bar-fill { height: 4px; border-radius: 2px; }
  .mc .pct-label { font-size: 10px; font-weight: 500; margin-top: 3px; text-align: right; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filt-btn { border: 0.5px solid var(--color-border-secondary); background: none; border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--color-text-secondary); cursor: pointer; transition: all .15s; }
  .legend { display: flex; gap: 14px; margin-bottom: 10px; font-size: 11px; color: var(--color-text-tertiary); flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .leg-box { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .bar-name { width: 128px; font-size: 11px; color: var(--color-text-secondary); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-pct { width: 46px; font-size: 11px; font-weight: 500; text-align: right; flex-shrink: 0; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; width: 68px; text-align: center; flex-shrink: 0; }
</style>

const BUCKETS = [
  { key:'exceed',  label:'Over exceed', range:'>100%',   color:'#534AB7', bg:'#EEEDFE', text:'#3C3489' },
  { key:'healthy', label:'Healthy',     range:'75–100%', color:'#1D9E75', bg:'#E1F5EE', text:'#085041' },
  { key:'watch',   label:'Watch',       range:'30–75%',  color:'#BA7517', bg:'#FAEEDA', text:'#633806' },
  { key:'low',     label:'Low',         range:'10–30%',  color:'#D85A30', bg:'#FAECE7', text:'#712B13' },
  { key:'risk',    label:'Risk',        range:'1–10%',   color:'#E24B4A', bg:'#FCEBEB', text:'#791F1F' },
  { key:'zero',    label:'Zero',        range:'0%',      color:'#5F5E5A', bg:'#F1EFE8', text:'#2C2C2A' },
];

function getBucket(pct) {
  if (pct > 100) return 'exceed';
  if (pct >= 75)  return 'healthy';
  if (pct >= 30)  return 'watch';
  if (pct >= 10)  return 'low';
  if (pct > 0)    return 'risk';
  return 'zero';
}

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

const data = raw.filter(d => d.committed > 0).map(d => {
  const actual = d.b2c + d.b2b + d.qc;
  const pct = Math.round((actual / d.committed) * 100);
  return {...d, actual, pct, bucket: getBucket(pct)};
});

const totalCommitted = data.reduce((s,d)=>s+d.committed, 0);
const totalActual    = data.reduce((s,d)=>s+d.actual, 0);
const totalAccounts  = data.length;
const overallPct     = Math.round((totalActual/totalCommitted)*100);
const potentialLoss  = Math.max(0, totalCommitted - totalActual);

document.getElementById('summary').innerHTML = `
  <div class="sc"><div class="lbl">Total accounts</div><div class="val">${totalAccounts}</div><div class="sub">Q2 FY26 live</div></div>

`;

document.getElementById('metrics').innerHTML = BUCKETS.map(b => {
  const group  = data.filter(d=>d.bucket===b.key);
  const count  = group.length;
  const mrr    = group.reduce((s,d)=>s+d.committed, 0);
  const actual = group.reduce((s,d)=>s+d.actual, 0);
  const volPct = mrr > 0 ? Math.min(Math.round((actual/mrr)*100), 999) : 0;
  const barW   = Math.min(volPct, 100);
  const volLabel = volPct > 200 ? '>200%' : volPct+'%';

  return `<div class="mc" style="background:${b.bg};border-color:${b.color}33" onclick="setFilter('${b.key}',document.querySelector('[data-key=${b.key}]'))">

    <div class="row">

      <span class="row-val" style="color:${b.color}">${fmt(mrr)}</span>
    </div>
    <div class="row">
      <span class="row-label" style="color:${b.text}">Actual volume</span>
      <span class="row-val" style="color:${b.color}">${fmt(actual)}</span>
    </div>
    <div class="row" style="margin-top:6px">
      <span class="row-label" style="color:${b.text}">Committed txns</span>
      <span class="row-val" style="color:${b.color}">${fmt(mrr)}</span>
    </div>
    <div class="row">
      <span class="row-label" style="color:${b.text}">Total volume</span>
      <span class="row-val" style="color:${b.color}">${fmt(actual)}</span>
    </div>
    <div class="pct-bar-track" style="background:${b.color}22">
      <div class="pct-bar-fill" style="width:${barW}%;background:${b.color}"></div>
    </div>
    <div class="pct-label" style="color:${b.color}">${volLabel} realized</div>
  </div>`;
}).join('');

const allBtn = `<button class="filt-btn" data-key="all" style="background:#534AB7;color:#fff;border-color:#534AB7" onclick="setFilter('all',this)">All accounts</button>`;
document.getElementById('filters').innerHTML = allBtn + BUCKETS.map(b =>
  `<button class="filt-btn" data-key="${b.key}" onclick="setFilter('${b.key}',this)">${b.label} ${b.range}</button>`
).join('');

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filt-btn').forEach(b => { b.style.background=''; b.style.color=''; b.style.borderColor=''; });
  if (!btn) btn = document.querySelector(`[data-key="${f}"]`);
  const c = f==='all' ? '#534AB7' : BUCKETS.find(b=>b.key===f).color;
  btn.style.background=c; btn.style.color='#fff'; btn.style.borderColor=c;
  renderBars();
}

function renderBars() {
  let filtered = currentFilter==='all' ? [...data] : data.filter(d=>d.bucket===currentFilter);
  filtered.sort((a,b)=>b.committed-a.committed);
  const bInfo = key => BUCKETS.find(b=>b.key===key);
  const maxVal = Math.max(...filtered.map(d=>Math.max(d.committed,d.actual)),1);

  document.getElementById('section-label').textContent = currentFilter==='all'
    ? `All ${filtered.length} accounts — sorted by committed volume`
    : `${bInfo(currentFilter).label} (${bInfo(currentFilter).range}) — ${filtered.length} accounts`;

  document.getElementById('bars').innerHTML = filtered.map(d => {
    const b = bInfo(d.bucket);
    const cW   = Math.round((d.committed/maxVal)*100);
    const b2cW = Math.min(Math.round((d.b2c/maxVal)*100),100);
    const b2bW = Math.min(Math.round((d.b2b/maxVal)*100),100);
    const qcW  = Math.min(Math.round((d.qc/maxVal)*100),100);
    const pLabel = d.pct>500?'>500%':d.pct+'%';
    return `<div class="bar-row">
      <div class="bar-name" title="${d.n}">${d.n}</div>
      <div style="flex:1;height:10px;background:var(--color-background-tertiary);border-radius:5px;position:relative;">
        <div style="position:absolute;top:0;left:0;width:${cW}%;height:10px;background:#D3D1C7;border-radius:5px;"></div>
        <div style="position:absolute;top:0;left:0;width:${b2cW}%;height:10px;background:#534AB7;border-radius:5px;opacity:.9"></div>
        <div style="position:absolute;top:0;left:0;width:${b2bW}%;height:5px;background:#1D9E75;border-radius:3px;"></div>
        <div style="position:absolute;bottom:0;left:0;width:${qcW}%;height:5px;background:#EF9F27;border-radius:3px;"></div>
      </div>
      <div class="bar-pct" style="color:${b.color}">${pLabel}</div>
      <span class="pill" style="background:${b.bg};color:${b.text}">${b.label}</span>
    </div>`;
  }).join('');
}
